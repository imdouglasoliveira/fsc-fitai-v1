# Skill Composition: Minimal Bug Fix
# Composição automática para bug fixes simples e rápidas
version: 1.0
name: "Minimal Bug Fix"
description: "Composition for fast bug fix workflow (identify → fix → test → commit)"

skills:
  - skill: "/be"
    condition_if: "backend_bug"
    description: "Backend bug fix"
    inputs:
      story_id: "from_parent"
      spec: "from_parent"
    outputs:
      - "bug_fixed"

  - skill: "/fe"
    condition_if: "frontend_bug"
    description: "Frontend bug fix"
    inputs:
      story_id: "from_parent"
      spec: "from_parent"
    outputs:
      - "bug_fixed"

  - skill: "/tdd"
    description: "Test that bug is fixed"
    inputs:
      code: "from_previous"
      coverage_target: 80
    outputs:
      - "regression_tests"
      - "proof_of_fix"

  - skill: "/qa"
    description: "Quick QA check"
    inputs:
      code: "from_previous"
      tests: "from_previous"
      story_id: "from_parent"
      quick_check: true
    outputs:
      - "qa_verdict"

  - skill: "/commit-dev"
    description: "Commit fix"
    inputs:
      changes: "from_previous"
      story_id: "from_parent"
      message_template: "fix({area}): {story_title}"
    outputs:
      - "commit_hash"

decision_gates:
  after_fix:
    condition: "bug_root_cause_fixed"
    action: "proceed_to_tdd"
    on_fail: "request_better_fix"

  after_tdd:
    condition: "proof_of_fix_exists && no_regressions"
    action: "proceed_to_qa"
    on_fail: "request_better_tests"

  after_qa:
    condition: "verdict == PASS"
    action: "proceed_to_commit"
    on_fail: "return_to_fix"

success_metrics:
  - "bug is fixed"
  - "no regressions"
  - "fix tested"
  - "code committed"

estimated_duration_minutes: 60

notes: |
  - Fast track: Fix → Test → QA → Commit
  - Minimal testing (regression focused)
  - No unnecessary refactoring
  - Quick approval gates for speed
