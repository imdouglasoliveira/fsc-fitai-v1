# Skill Composition: Full Fullstack Feature
# Composição automática para feature completa (FE + BE + DB + Tests + Docs)
version: 1.0
name: "Full Fullstack Feature"
description: "Composition for complete fullstack feature (backend routes + frontend components + DB + all tests)"

skills:
  - skill: "/be"
    description: "Backend implementation (routes, DB migrations, services)"
    inputs:
      story_id: "from_parent"
      spec: "from_parent"
      stack: "fastify"
    outputs:
      - "routes_created"
      - "db_migrations"
      - "services_implemented"

  - skill: "/fe"
    description: "Frontend implementation (components, hooks, integration)"
    inputs:
      story_id: "from_parent"
      spec: "from_parent"
      api_routes: "from_previous"
      stack: "next.js"
    outputs:
      - "components_created"
      - "hooks_created"
      - "api_integration_done"

  - skill: "/tdd"
    description: "All tests (unit + integration + e2e)"
    inputs:
      backend_code: "from_be"
      frontend_code: "from_fe"
      coverage_target: 85
    outputs:
      - "backend_tests"
      - "frontend_tests"
      - "integration_tests"
      - "coverage_report"

  - skill: "/react-doctor"
    description: "React best practices validation"
    inputs:
      code: "from_fe"
    outputs:
      - "react_issues"
      - "recommendations"

  - skill: "/qa"
    description: "Complete QA validation"
    inputs:
      backend_code: "from_be"
      frontend_code: "from_fe"
      all_tests: "from_tdd"
      story_id: "from_parent"
    outputs:
      - "qa_verdict"
      - "issues_found"

  - skill: "/commit-dev"
    description: "Commit all changes to dev branch"
    inputs:
      changes: "from_all"
      story_id: "from_parent"
      message_template: "feat(fullstack): implement {story_title}"
    outputs:
      - "commit_hash"
      - "branch_updated"

decision_gates:
  after_be:
    condition: "migrations_valid && routes_defined"
    action: "proceed_to_fe"
    on_fail: "request_backend_fix"

  after_fe:
    condition: "components_properly_integrated && api_calls_correct"
    action: "proceed_to_tdd"
    on_fail: "request_frontend_fix"

  after_tdd:
    condition: "test_coverage >= coverage_target && all_tests_green"
    action: "proceed_to_react_doctor"
    on_fail: "request_more_tests"

  after_react_doctor:
    condition: "no_critical_issues"
    action: "proceed_to_qa"
    on_fail: "fix_react_issues"

  after_qa:
    condition: "verdict == PASS"
    action: "proceed_to_commit"
    on_fail: "return_to_dev_fixes"

parallel_execution: false
# Note: Could be true for independent BE/FE work, but DB migrations must be first

success_metrics:
  - "backend routes working (tested)"
  - "frontend components working (tested)"
  - "frontend/backend integration verified"
  - "db migrations applied"
  - "all tests passing (85%+ coverage)"
  - "react best practices followed"
  - "code committed to dev"

estimated_duration_minutes: 240

notes: |
  - Sequence: BE → FE → TDD → ReactDoctor → QA → Commit
  - BE must complete first (DB migrations needed for FE integration tests)
  - FE runs after BE (uses API routes from BE)
  - TDD tests both BE and FE integration
  - ReactDoctor validates FE code quality
  - Full QA validates complete feature end-to-end
  - Automatic rollback if any gate fails
