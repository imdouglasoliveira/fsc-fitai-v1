name: Test & Coverage

on:
  push:
    branches: [dev, main, master, feature/**]
  pull_request:
    branches: [dev, main, master]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sgt_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/sgt_test"
        continue-on-error: true

      - name: Generate coverage report
        if: always()
        run: pnpm run test -- --coverage
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/sgt_test"
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const totalCoverage = coverage.total.lines.pct;

            const comment = `## Test Coverage Report

Total Coverage: **${totalCoverage.toFixed(2)}%**

| Branch | Coverage |
|--------|----------|
| Statements | ${coverage.total.statements.pct.toFixed(2)}% |
| Branches | ${coverage.total.branches.pct.toFixed(2)}% |
| Functions | ${coverage.total.functions.pct.toFixed(2)}% |
| Lines | ${coverage.total.lines.pct.toFixed(2)}% |

Target: 85% for features, 70-80% for bugs. ✅`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Check test results
        if: needs.test.result == 'failure'
        run: |
          echo "❌ Tests failed. Fix failing tests and push again."
          exit 1

      - name: Success
        if: needs.test.result == 'success'
        run: echo "✅ All tests passed!"
