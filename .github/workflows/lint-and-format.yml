name: Lint & Format Check

on:
  push:
    branches: [dev, main, master, feature/**]
  pull_request:
    branches: [dev, main, master]

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint
        continue-on-error: true

      - name: Report lint results
        if: failure()
        run: |
          echo "❌ Linting failed. Run 'pnpm run lint --fix' locally to fix issues."
          exit 1

  format:
    name: Prettier Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Prettier formatting
        run: pnpm run format --check
        continue-on-error: true

      - name: Report format results
        if: failure()
        run: |
          echo "⚠️ Code formatting issues found. Run 'pnpm run format' locally."
          exit 1

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm run type-check
        continue-on-error: true

      - name: Report type errors
        if: failure()
        run: |
          echo "❌ TypeScript errors found. Fix types and push again."
          exit 1

  summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    needs: [lint, format, type-check]
    if: always()

    steps:
      - name: Check job results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.format.result }}" == "failure" || "${{ needs.type-check.result }}" == "failure" ]]; then
            echo "❌ Code quality checks failed. Please fix and push again."
            exit 1
          fi
          echo "✅ All code quality checks passed!"
